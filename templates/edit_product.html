{% extends 'base.html' %}
{% block title %}Edit Product{% endblock %}
{% block page_title %}Edit Product{% endblock %}

{% block content %}
<div class="form-card">
    <form method="POST">
        <div class="form-group">
            <label>Product Name</label>
            <input type="text" name="product_name" class="form-control" value="{{ product['product_name'] }}" required>
        </div>
        <div class="form-row">
            <div class="form-group">
                <label>Product Type</label>
                <select name="product_type" class="form-control" required>
                    {% for t in ['Medicine','API','Lab Chemical','Nutraceutical','Packaging','Veterinary','Medical Device','Other'] %}
                    <option {% if product['product_type'] == t %}selected{% endif %}>{{ t }}</option>
                    {% endfor %}
                </select>
            </div>
            <div class="form-group">
                <label>Unit</label>
                <select name="unit" class="form-control" required>
                    {% for u in ['Units','kg','g','Litres','ml','Packs','Boxes'] %}
                    <option {% if product['unit'] == u %}selected{% endif %}>{{ u }}</option>
                    {% endfor %}
                </select>
            </div>
        </div>
        <div class="form-group">
            <label>Reorder Level</label>
            <input type="number" name="reorder_level" class="form-control" value="{{ product['reorder_level'] }}" required>
        </div>
        <div class="form-actions">
            <a href="{{ url_for('inventory') }}" class="btn btn-secondary">Cancel</a>
            <button type="submit" class="btn btn-primary">Update Product</button>
        </div>
    </form>
</div>
{% endblock %}
