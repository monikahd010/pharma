{% extends 'base.html' %}
{% block title %}Analytics{% endblock %}
{% block page_title %}Analytics & Reports{% endblock %}

{% block content %}
<div class="analytics-grid">
    <div class="card chart-card">
        <h2>Stock Levels by Product</h2>
        <canvas id="stockChart"></canvas>
    </div>
    <div class="card chart-card">
        <h2>QC Batch Results</h2>
        <canvas id="qcChart"></canvas>
    </div>
    <div class="card chart-card">
        <h2>Products by Type</h2>
        <canvas id="typeChart"></canvas>
    </div>
    <div class="card chart-card">
        <h2>Low Stock Products</h2>
        <canvas id="lowChart"></canvas>
    </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.0/chart.umd.min.js"></script>
<script>
const stockLabels = {{ products | map(attribute='product_name') | list | tojson }};
const stockData   = {{ products | map(attribute='current_stock') | list | tojson }};
const reorderData = {{ products | map(attribute='reorder_level') | list | tojson }};

const qcLabels = {{ batch_stats | map(attribute='qc_status') | list | tojson }};
const qcData   = {{ batch_stats | map(attribute='count') | list | tojson }};

const typeLabels = {{ type_stats | map(attribute='product_type') | list | tojson }};
const typeData   = {{ type_stats | map(attribute='count') | list | tojson }};

const lowLabels = {{ low_stock | map(attribute='product_name') | list | tojson }};
const lowData   = {{ low_stock | map(attribute='current_stock') | list | tojson }};

const palette = ['#00b4d8','#90e0ef','#0077b6','#023e8a','#48cae4','#ade8f4','#caf0f8'];
const qcColors = qcLabels.map(l => l === 'Pass' ? '#2ec4b6' : l === 'Fail' ? '#e63946' : '#ffd166');

new Chart(document.getElementById('stockChart'), {
    type: 'bar',
    data: {
        labels: stockLabels,
        datasets: [
            { label: 'Current Stock', data: stockData, backgroundColor: '#00b4d8', borderRadius: 6 },
            { label: 'Reorder Level', data: reorderData, backgroundColor: '#e63946', borderRadius: 6 }
        ]
    },
    options: { responsive: true, plugins: { legend: { labels: { color: '#ccc' } } },
               scales: { x: { ticks: { color: '#aaa' } }, y: { ticks: { color: '#aaa' } } } }
});

new Chart(document.getElementById('qcChart'), {
    type: 'doughnut',
    data: { labels: qcLabels, datasets: [{ data: qcData, backgroundColor: qcColors, borderWidth: 0 }] },
    options: { responsive: true, plugins: { legend: { labels: { color: '#ccc' } } } }
});

new Chart(document.getElementById('typeChart'), {
    type: 'pie',
    data: { labels: typeLabels, datasets: [{ data: typeData, backgroundColor: palette, borderWidth: 0 }] },
    options: { responsive: true, plugins: { legend: { labels: { color: '#ccc' } } } }
});

new Chart(document.getElementById('lowChart'), {
    type: 'bar',
    data: { labels: lowLabels, datasets: [{ label: 'Stock', data: lowData, backgroundColor: '#e63946', borderRadius: 6 }] },
    options: { responsive: true, indexAxis: 'y',
               plugins: { legend: { labels: { color: '#ccc' } } },
               scales: { x: { ticks: { color: '#aaa' } }, y: { ticks: { color: '#aaa' } } } }
});
</script>
{% endblock %}
