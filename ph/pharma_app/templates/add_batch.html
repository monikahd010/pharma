{% extends 'base.html' %}
{% block title %}Add Batch{% endblock %}
{% block page_title %}Log New Batch{% endblock %}

{% block content %}
<div class="form-card">
    <form method="POST">
        <div class="form-row">
            <div class="form-group">
                <label>Batch Number</label>
                <input type="text" name="batch_number" class="form-control" placeholder="e.g. SL-2024-011" required>
            </div>
            <div class="form-group">
                <label>Product</label>
                <select name="product_id" class="form-control" required>
                    <option value="">-- Select Product --</option>
                    {% for p in products %}
                    <option value="{{ p['id'] }}">{{ p['product_name'] }} ({{ p['product_type'] }})</option>
                    {% endfor %}
                </select>
            </div>
        </div>
        <div class="form-row">
            <div class="form-group">
                <label>Manufacture Date</label>
                <input type="date" name="manufacture_date" class="form-control" required>
            </div>
            <div class="form-group">
                <label>Expiry Date</label>
                <input type="date" name="expiry_date" class="form-control" required>
            </div>
        </div>
        <div class="form-row">
            <div class="form-group">
                <label>Quantity Produced</label>
                <input type="number" name="quantity" class="form-control" min="1" placeholder="e.g. 500" required>
            </div>
            <div class="form-group">
                <label>QC Status</label>
                <select name="qc_status" class="form-control">
                    <option value="Pending">Pending</option>
                    <option value="Pass">Pass</option>
                    <option value="Fail">Fail</option>
                </select>
            </div>
        </div>

        <div class="section-divider">QC Test Parameters (optional)</div>

        <div class="form-row">
            <div class="form-group">
                <label>pH Level</label>
                <input type="text" name="ph_level" class="form-control" placeholder="e.g. 6.8">
            </div>
            <div class="form-group">
                <label>Purity (%)</label>
                <input type="text" name="purity" class="form-control" placeholder="e.g. 99.2">
            </div>
            <div class="form-group">
                <label>Moisture (%)</label>
                <input type="text" name="moisture" class="form-control" placeholder="e.g. 0.3">
            </div>
        </div>
        <div class="form-group">
            <label>Remarks</label>
            <textarea name="remarks" class="form-control" rows="2" placeholder="Any additional notes..."></textarea>
        </div>
        <div class="info-box">
            💡 <strong>Note:</strong> If QC Status is set to <strong>Pass</strong>, the batch quantity will automatically be added to inventory stock.
        </div>
        <div class="form-actions">
            <a href="{{ url_for('batches') }}" class="btn btn-secondary">Cancel</a>
            <button type="submit" class="btn btn-primary">Log Batch</button>
        </div>
    </form>
</div>
{% endblock %}
