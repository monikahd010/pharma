{% extends 'base.html' %}
{% block title %}Add Product{% endblock %}
{% block page_title %}Add New Product{% endblock %}

{% block content %}
<div class="form-card">
    <form method="POST">
        <div class="form-group">
            <label>Product Name</label>
            <input type="text" name="product_name" class="form-control" placeholder="e.g. Amoxicillin 500mg" required>
        </div>
        <div class="form-row">
            <div class="form-group">
                <label>Product Type</label>
                <select name="product_type" class="form-control" required>
                    <option value="">-- Select Type --</option>
                    <option>Medicine</option>
                    <option>API</option>
                    <option>Lab Chemical</option>
                    <option>Nutraceutical</option>
                    <option>Packaging</option>
                    <option>Veterinary</option>
                    <option>Medical Device</option>
                    <option>Other</option>
                </select>
            </div>
            <div class="form-group">
                <label>Unit of Measurement</label>
                <select name="unit" class="form-control" required>
                    <option>Units</option>
                    <option>kg</option>
                    <option>g</option>
                    <option>Litres</option>
                    <option>ml</option>
                    <option>Packs</option>
                    <option>Boxes</option>
                </select>
            </div>
        </div>
        <div class="form-group">
            <label>Reorder Level (minimum stock threshold)</label>
            <input type="number" name="reorder_level" class="form-control" value="50" min="0" required>
        </div>
        <div class="form-actions">
            <a href="{{ url_for('inventory') }}" class="btn btn-secondary">Cancel</a>
            <button type="submit" class="btn btn-primary">Add Product</button>
        </div>
    </form>
</div>
{% endblock %}
